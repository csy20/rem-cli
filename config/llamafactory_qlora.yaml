### LlamaFactory QLoRA config for rem-llm
model_name_or_path: deepseek-ai/deepseek-coder-1.3b-base
stage: sft
do_train: true
finetuning_type: lora
quantization_bit: 4

dataset_dir: data
dataset: rem_train
template: default
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true

output_dir: models/rem-coder-lora-lf
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true

per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03

fp16: true
report_to: none

lora_rank: 16
lora_alpha: 16
lora_dropout: 0.0
lora_target: all
