name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rem-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rem-cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: fmt check
        working-directory: rem-cli
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: rem-cli
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: rem-cli
        run: cargo test

      - name: install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: audit
        working-directory: rem-cli
        run: cargo audit

      - name: install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: deny
        working-directory: rem-cli
        run: cargo deny check

      - name: build
        working-directory: rem-cli
        run: cargo build --release

      - name: bench
        working-directory: rem-cli
        run: cargo bench --no-run 2>&1 || echo "benchmarks exist but require --no-run (runs in CI only for compilation check)"
