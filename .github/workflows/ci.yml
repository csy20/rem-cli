name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rem-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rem-cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: fmt check
        working-directory: rem-cli
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: rem-cli
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: rem-cli
        run: cargo test

      - name: build
        working-directory: rem-cli
        run: cargo build --release
