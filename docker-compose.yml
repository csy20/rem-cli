services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  rem:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - rem_config:/root/.config/rem-cli

volumes:
  ollama_data:
  rem_config:
